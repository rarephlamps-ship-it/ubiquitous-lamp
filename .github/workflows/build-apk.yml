name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build broadly compatible installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct Android project
        shell: bash
        run: |
          set -euo pipefail
          cat source/chunk-00.b64 \
              source/chunk-01.b64 \
              source/chunk-02.b64 \
              source/chunk-03.b64 \
              source/chunk-04.b64 > project.tar.gz.b64
          base64 --decode project.tar.gz.b64 > project.tar.gz
          tar -xzf project.tar.gz
          python3 source/apply-fixes.py
          test -f settings.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          grep -q "private void showMessage(String text, float seconds)" app/src/main/java/dk/ruko/ondskabensskov/GameView.java

      - name: Apply installer compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          gradle = Path("app/build.gradle")
          text = gradle.read_text(encoding="utf-8")
          text = text.replace("applicationId 'dk.ruko.ondskabensskov'", "applicationId 'dk.ruko.ondskabensskov.compat'")
          text = text.replace("minSdk 26", "minSdk 23")
          text = text.replace("versionCode 1", "versionCode 2")
          text = text.replace("versionName '1.0.0'", "versionName '1.0.1-install-fix'")
          gradle.write_text(text, encoding="utf-8")

          manifest = Path("app/src/main/AndroidManifest.xml")
          xml = manifest.read_text(encoding="utf-8")
          xml = xml.replace('android:name=".MainActivity"', 'android:name="dk.ruko.ondskabensskov.MainActivity"')
          xml = xml.replace('<application\n', '<application\n        android:installLocation="auto"\n')
          manifest.write_text(xml, encoding="utf-8")

          assert "dk.ruko.ondskabensskov.compat" in gradle.read_text(encoding="utf-8")
          assert "minSdk 23" in gradle.read_text(encoding="utf-8")
          assert "versionCode 2" in gradle.read_text(encoding="utf-8")
          assert "dk.ruko.ondskabensskov.MainActivity" in manifest.read_text(encoding="utf-8")
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compile Android project
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set +e
          gradle --no-daemon --stacktrace clean assembleDebug > build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          {
            echo "=== COMPILER ERROR SUMMARY ==="
            grep -nE "error:|FAILURE:|What went wrong|Execution failed|Caused by:|Android resource linking failed|AAPT|Could not" build.log | tail -n 240 || true
            echo "=== FINAL 320 LOG LINES ==="
            tail -n 320 build.log
          } > build-summary.txt
          cat build-summary.txt
          exit 0

      - name: Verify APK structure, package and signatures
        if: steps.compile.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          BT="$ANDROID_HOME/build-tools/35.0.0"
          test -s "$APK"
          "$BT/zipalign" -c -P 16 -v 4 "$APK"
          "$BT/apksigner" verify --verbose --print-certs "$APK" | tee apk-signature.txt
          "$BT/aapt" dump badging "$APK" | tee apk-badging.txt
          grep -q "package: name='dk.ruko.ondskabensskov.compat'" apk-badging.txt
          grep -q "sdkVersion:'23'" apk-badging.txt
          grep -q "Verified using v1 scheme (JAR signing): true" apk-signature.txt
          grep -q "Verified using v2 scheme (APK Signature Scheme v2): true" apk-signature.txt
          mkdir -p dist
          cp "$APK" "dist/Ondskabens-Skov-install-fix-v1.0.1.apk"
          sha256sum "dist/Ondskabens-Skov-install-fix-v1.0.1.apk" > "dist/Ondskabens-Skov-install-fix-v1.0.1.apk.sha256"
          ls -lh dist/*

      - name: Upload fixed APK artifact
        if: steps.compile.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Ondskabens-Skov-Install-Fix
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ondskabens-Skov-Install-Fix-Diagnostics
          path: |
            build.log
            build-summary.txt
            apk-signature.txt
            apk-badging.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Fail when compilation failed
        if: steps.compile.outputs.status != '0'
        shell: bash
        run: exit 1
