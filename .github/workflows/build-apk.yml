name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build installable debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct Android project
        shell: bash
        run: |
          set -euo pipefail
          cat source/chunk-00.b64 \
              source/chunk-01.b64 \
              source/chunk-02.b64 \
              source/chunk-03.b64 \
              source/chunk-04.b64 > project.tar.gz.b64
          base64 --decode project.tar.gz.b64 > project.tar.gz
          tar -xzf project.tar.gz
          test -f settings.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        shell: bash
        run: gradle --no-daemon --stacktrace clean assembleDebug

      - name: Verify APK
        shell: bash
        run: |
          test -s app/build/outputs/apk/debug/app-debug.apk
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ondskabens-Skov-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
